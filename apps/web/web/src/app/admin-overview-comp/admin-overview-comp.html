<app-nav-comp></app-nav-comp>

<div class="m-4 d-grid gap-4">

  <h1>Übersicht</h1>

  <app-info-flex-comp [data]="infoContainer"></app-info-flex-comp>

  <div class="d-grid gap-4 statistics">
    <div class="d-flex gap-3">
      <app-button-comp text="Markerl erfassen" buttonDesignType="primary" buttonType="link" link="http://localhost:4200/create-ticket"></app-button-comp>
      <app-button-comp text="Clearing öffnen" buttonDesignType="outline-secondary" buttonType="link" link="http://localhost:4200/clearing-tickets"></app-button-comp>
      <div (click)="onToggleLastYear()" class="align-self-center form-check">
        <input class="form-check-input" type="checkbox" value="active" id="checkDefault">
        <label class="form-check-label" for="checkDefault">Nur letzte 12 Monate</label>
      </div>
    </div>
    <div class="statistics-table">
      <app-table-overview-comp caption="Alle Mitarbeitereinträge" [data]="dataTable"></app-table-overview-comp>
    </div>
  </div>
</div>
