<app-nav-comp></app-nav-comp>

<div class="m-4 d-grid gap-4">

  <h1>Übersicht</h1>

  <app-info-flex-comp [data]="infoContainer()"></app-info-flex-comp>

  <div class="d-grid gap-4">
    <div class="d-flex gap-3">
      <app-button-comp text="Markerl erfassen" buttonDesignType="primary" buttonType="link" link="/create-ticket"></app-button-comp>
      <app-button-comp text="Clearing öffnen" buttonDesignType="outline-secondary" buttonType="link" link="/clearing-tickets"></app-button-comp>
      <div class="align-self-center form-check">
        <input class="form-check-input" type="checkbox" [(ngModel)]="lastYear" (ngModelChange)="onToggleLastYear()" id="checkLastYearActive">
        <label class="form-check-label" for="checkLastYearActive">Nur letzte 12 Monate</label>
      </div>
    </div>
    <div class="table-responsive-md">
      <app-table-overview-comp caption="Alle Markerl" [data]="dataTable()" (sortChange)="onSortChange($event)"></app-table-overview-comp>
    </div>
  </div>
</div>
