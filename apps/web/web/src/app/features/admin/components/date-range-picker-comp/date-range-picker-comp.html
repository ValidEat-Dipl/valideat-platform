<div class="d-flex gap-3 align-items-end">
  <div>
    <input
      class="form-control"
      type="date"
      [(ngModel)]="fromDate"
      (ngModelChange)="onDateChange()">
  </div>
  <div>
    <input
      class="form-control"
      type="date"
      [(ngModel)]="toDate"
      (ngModelChange)="onDateChange()">
  </div>
  <button
    class="btn btn-outline-secondary"
    type="button"
    (click)="clearDates()">
    Zurücksetzen
  </button>
</div>
@if (isInvalidRange()) {
  <div class="text-danger mt-2">
    Das Enddatum muss nach dem Startdatum liegen.
  </div>
}
