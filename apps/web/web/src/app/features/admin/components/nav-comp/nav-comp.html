  <div class="container-fluid">

      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">

        <h5 class="offcanvas-title" id="offcanvasNavbarLabel">ValidEat <span style="font-size: smaller; color: var(--gray-400)">HR</span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
          @for (entry of datalistLabels(); track $index) {
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" [href]="datalistHrefs().at($index)"><i class="bi bi-{{ dataListIcons().at($index) }} p-2"></i> {{ entry }}</a>
            </li>
          }
        </ul>
      </div>
    </div>
  </div>
</nav>
