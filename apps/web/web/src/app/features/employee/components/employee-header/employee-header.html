<header class="employee-header bg-white border-bottom">
  <div class="d-flex align-items-center gap-3 px-4 py-3">
    @if (showBackButton) {
      <button
        class="btn btn-link p-0 text-secondary"
        type="button"
        aria-label="Zurück"
        (click)="goBack()"
      >
        <i class="bi bi-chevron-left fs-4" aria-hidden="true"></i>
      </button>
    }

    <span class="fw-semibold">{{ title }}</span>
  </div>
</header>
