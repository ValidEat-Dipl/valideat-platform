<div class="review-entry-page">
  <app-employee-header title="Verwendung erfassen" [showBackButton]="true" />

  <div class="px-4 py-4">
    <div class="row gx-0 justify-content-center">
      <main class="col-12 col-sm-10 col-md-8 col-lg-7 col-xl-6">
        <h1 class="h4 mb-4 fw-semibold">Angaben prüfen</h1>

        @if (ticket) {
          <div class="card mb-4">
            <dl class="list-group list-group-flush mb-0">
              <div class="list-group-item d-flex justify-content-between gap-3 px-4 py-3">
                <dt class="text-secondary fw-normal">DATUM</dt>
                <dd class="mb-0 fw-semibold text-end">{{ formatTicketDate(ticket.date) }}</dd>
              </div>
              <div class="list-group-item d-flex justify-content-between gap-3 px-4 py-3">
                <dt class="text-secondary fw-normal">NAME</dt>
                <dd class="mb-0 fw-semibold text-end">{{ ticket.employeeName }}</dd>
              </div>
              <div class="list-group-item d-flex justify-content-between gap-3 px-4 py-3">
                <dt class="text-secondary fw-normal">KOSTENSTELLE</dt>
                <dd class="mb-0 fw-semibold text-end">{{ ticket.costOrder }}</dd>
              </div>
              <div class="list-group-item d-flex justify-content-between gap-3 px-4 py-3">
                <dt class="text-secondary fw-normal">MARKERLSTUFE</dt>
                <dd class="mb-0 fw-semibold text-end">{{ ticket.tier }}</dd>
              </div>
              <div class="list-group-item d-flex justify-content-between gap-3 px-4 py-3">
                <dt class="text-secondary fw-normal">RESTAURANT</dt>
                <dd class="mb-0 fw-semibold text-end">{{ ticket.restaurantName }}</dd>
              </div>
            </dl>
          </div>

          @if (errorMessage) {
            <div class="alert alert-danger">{{ errorMessage }}</div>
          }

          <button
            class="btn btn-primary btn-lg w-100 mb-2"
            type="button"
            [disabled]="isSaving"
            (click)="confirmEntry()"
          >
            {{ isSaving ? 'Wird gespeichert...' : 'Erfassung bestätigen' }}
          </button>
          <button
            class="btn btn-outline-secondary btn-lg w-100 mb-3"
            type="button"
            [disabled]="isSaving"
            (click)="goBack()"
          >
            Zurück
          </button>
          <button
            class="btn btn-link w-100 text-decoration-none"
            type="button"
            [disabled]="isSaving"
            (click)="cancel()"
          >
            Abbrechen
          </button>
        }
      </main>
    </div>
  </div>
</div>
