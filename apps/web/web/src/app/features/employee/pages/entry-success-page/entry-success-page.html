<div class="entry-success-page">
  <app-employee-header title="Erfasst" />

  <div class="px-4 py-5">
    <div class="row gx-0 justify-content-center">
      <main class="col-12 col-sm-10 col-md-8 col-lg-7 col-xl-6 text-center">
        @if (ticket) {
          <div class="success-icon d-inline-flex align-items-center justify-content-center mb-4">
            <i class="bi bi-check-lg" aria-hidden="true"></i>
          </div>

          <h1 class="h3 fw-semibold">Markerl wurde erfasst</h1>
          <p class="text-secondary fs-5 mb-4">
            Ihre Verwendung wurde für den {{ formatTicketDate(ticket.date) }} gespeichert.
          </p>

          <div class="card text-start mb-4">
            <dl class="list-group list-group-flush mb-0">
              <div class="list-group-item d-flex justify-content-between gap-3 px-4 py-3">
                <dt class="text-secondary fw-normal">STUFE</dt>
                <dd class="mb-0 fw-semibold text-end">{{ ticket.tier }}</dd>
              </div>
              <div class="list-group-item d-flex justify-content-between gap-3 px-4 py-3">
                <dt class="text-secondary fw-normal">KOSTENSTELLE</dt>
                <dd class="mb-0 fw-semibold text-end">{{ ticket.costOrder }}</dd>
              </div>
              <div class="list-group-item d-flex justify-content-between gap-3 px-4 py-3">
                <dt class="text-secondary fw-normal">RESTAURANT</dt>
                <dd class="mb-0 fw-semibold text-end">{{ ticket.restaurantName }}</dd>
              </div>
              <div class="list-group-item d-flex justify-content-between gap-3 px-4 py-3">
                <dt class="text-secondary fw-normal">STATUS</dt>
                <dd class="mb-0">
                  <span class="badge rounded-pill text-bg-primary">
                    <i class="bi bi-clock me-1" aria-hidden="true"></i>Erfasst
                  </span>
                </dd>
              </div>
            </dl>
          </div>

          <div class="alert alert-info d-flex gap-2 text-start" role="note">
            <i class="bi bi-info-circle flex-shrink-0" aria-hidden="true"></i>
            <span>Geben Sie das physische Markerl weiterhin im Restaurant ab.</span>
          </div>

          <button class="btn btn-primary btn-lg w-100 mb-2" type="button" (click)="goToStart()">
            Zur Startseite
          </button>
          <button class="btn btn-outline-secondary btn-lg w-100" type="button" disabled>
            Erfassung ansehen
          </button>
        }
      </main>
    </div>
  </div>
</div>
