<form [formGroup]="form" (ngSubmit)="onSubmit()" class="d-grid gap-3 w-50">
  <div class="">
    <label for="username" class="form-label">1. Mitarbeiter</label>
    <input type="text" class="form-control" id="username" formControlName="username" placeholder="Vorname Nachname">
  </div>
  <div class="d-flex gap-3">
    <div class="w-100">
      <label for="date" class="form-label">2. Datum</label>
      <input type="date" class="form-control" id="date" formControlName="useDate">
    </div>
    <div class="w-100">
      <label for="costDepartment" class="form-label">3. Kostenstelle</label>
      <input type="text" class="form-control" id="costDepartment" formControlName="costDepartment">
    </div>
  </div>
  <div class="d-flex gap-3">
    <div class="w-100">
      <label for="costRank" class="form-label">4. Markerlstufe</label>
      <input type="text" class="form-control" id="costRank" formControlName="costRank">
    </div>
    <div class="w-100">
      <label for="restaurant" class="form-label">5. Restaurant</label>
      <input type="text" class="form-control" id="restaurant" formControlName="restaurant">
    </div>
  </div>
  <div class="">
    <label for="dateUsage" class="form-label">6. Eingangsdatum</label>
    <input type="date" class="form-control" id="dateUsage" formControlName="checkDate">
  </div>
  <div class="d-flex gap-1 mt-3">
    <app-button-comp buttonType="submit" (click)="anotherTicket = true" disabledExpression="form.invalid || form.pending" buttonDesignType="primary" text="Speichern und nächstes"></app-button-comp>
    <app-button-comp buttonType="submit" (click)="anotherTicket = false" buttonDesignType="secondary" text="Speichern"></app-button-comp>
    <app-button-comp buttonType="reset" buttonDesignType="outline-secondary" text="Formular zurücksetzen"></app-button-comp>
  </div>
</form>
